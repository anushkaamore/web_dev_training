<body>
    <form action="" method="" target="_blank" autocomplete="on"  novalidate>
         <label for="fname">fname name : </label><br>
           <input type="text" id="fname" name="fname" value="abc" readonly><br>
           <label for="lname">last name : </label><br>
           <input type="text" id="lname" name="lname"  disabled><br>
           <input type="email" name="" id=""><br><br>
           

           <input type="text" name="" id="" size="50"><br>
           <input type="text" name="" id="" maxlength="4"><br>
           <input type="number" name="" id="" min="5" max="4" step="7"><br>
           <input type="email" name="" id="" placeholder="enter email" required autofocus><br>
           
           <input type="file" name="" id="" multiple><br>
           <input type="text" pattern="[0-9]{10}" placeholder="enter mobile number"> 
           <!-- [A-Z]{3}
           [a-z]{20}
           [0-9]{3}-[A-Z]{4}-[a-z]{3} -->
           
          <input type="submit" value="submit">
     </form>
