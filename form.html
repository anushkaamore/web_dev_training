<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="">
           <label for="fname">fname name : </label><br>
           <input type="text" id="fname"><br>
           <label for="lname">last name : </label><br>
           <input type="text" id="lname"><br>

           <label>select gender : </label>
           <input type="radio" id="male" name="gender">
           <label for="male">male</label>
           <input type="radio" id="female" name="gender">
           <label for="female" >female</label><br>

           <label>select subjects :</label>
           <input type="checkbox" id="maths">
           <label for="maths">Maths</label>
           <input type="checkbox" id="science">
           <label for="science">science</label>
           <input type="checkbox" id="chemistry">
           <label for="chemistry">chemistry</label>
           <input type="checkbox" id="physics">
           <label for="physics">physics</label><br>

           <label for="email">email :</label>
           <input type="email" id="email"><br>

           
           <label for="password">password :</label>
           <input type="password" id="password"><br>

           <label for="file"> upload file :</label>
           <input type="file" id="file"><br>

           <label for="date"> date :</label>
           <input type="date" id="date"><br>

           <label for="datetime-local"> datetime-local :</label>
           <input type="datetime-local" id="datetime-local">

           <input type="hidden" id="hidden" value="ABC">
           <br>
        

           <input type="range"><br>

           <label for="color">color picker</label>
           <input type="color" id="color">
            <br>
           <input type="search"><br>
           <input type="number"><br>
           <input type="month"><br>
           <input type="week"><br>
           <input type="time"><br>
           <input type="url"><br>
          <input type="tel"><br>
           <input type="button" value="button"><br>

           
           <input type="reset" value="Reset" id="reset">
           <input type="submit" value="submit button">

    </form>


</body>
</html>
