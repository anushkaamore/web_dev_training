<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title> 
 <link rel="stylesheet" href="./style.css">
  <style>
    * {
      color: pink;
      
    }

    h2{
      color: red;
      font-weight: 800;
    }

    p {
      color: yellow !important;
    }

    #i1 {
      color: aqua;
    }

    .c1 {
      color: brown;
    }

    #i2 {
      color: red;
    }

    .c2 {
      color: yellow;
    }
    h1{
      color: brown;
    }
  </style>
 
      
  </head>

<body>
  <h1 style="font-size: 80px;">inline CSS</h1>
  <h2>internal css</h2>
  <h3>external css</h3>
  <p>hiii i am checking</p>

  <h4 id="i1">hii i am CSS id selector</h4>
  <h4 class="c1">hii i am CSS class selector</h4>
  <h4>hii i am CSS universal selector</h4>

  <h5 id="i2" class="c2">hii i am CSS selector checking</h5>

  <!-- css priority - inline css -> internal or external which is written most recently -->
  <!-- selector priority - id selector-> class selector-> element selector-> universal selector -->

  
  
  
</body>

</html>
