<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 300px;
            width: 500px;
            border: 1px solid;
            margin: 10px;
        }
        #b1{
            /* background-image: radial-gradient(red,green,yellow); */
            /* background-image: radial-gradient(red 10%, green 20%, yellow); */
            background-image: radial-gradient(circle,blue,red,yellow);
        }
        #b2{
             /* background-image: repeating-radial-gradient(red 10%, blue 20%, yellow 10%); */
             background-image: repeating-radial-gradient(circle,white 10%, black 20%);
        }
        #b3{
           /* background-image: conic-gradient(red yellow,black); */
            /* background-image: conic-gradient(red, yellow,black,green); */
             /* background-image: conic-gradient(from 45deg,red, yellow,green); */
             background-image: conic-gradient(rgba(255,0,0,0),rgba(255,0,0,1));
              
        }
        #b4{
            border-radius: 50%;
            /* background-image: conic-gradient(red 0deg,red 90deg, yellow 90deg,yellow 180deg,green 180deg,green 270deg,blue 270deg,blue 360deg); */
            /* background-image: repeating-conic-gradient(orange 10%, white 20%); */
             background-image: repeating-conic-gradient(red 10%, white 20%, black 10%);
        }

    </style>
</head>
<body>
    <div id="b1">

    </div>
    <div id="b2">

    </div>
     <div id="b3">

    </div>
     <div id="b4">

    </div>
</body>
</html>
